<!DOCTYPE html>
<html lang="en">
  <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - LifeBridge Church Renovation Tracker</title>
      <style>
                * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
                }
                body {
                              background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
                              min-height: 100vh;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                }
                .login-container {
                              background: white;
                              padding: 40px;
                              border-radius: 12px;
                              box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                              width: 100%;
                              max-width: 400px;
                }
                .logo {
                              text-align: center;
                              margin-bottom: 30px;
                }
                .logo img {
                              width: 80px;
                              height: 80px;
                              border-radius: 50%;
                }
                h1 {
                              color: #1e3c72;
                              text-align: center;
                              margin-bottom: 10px;
                              font-size: 24px;
                }
                .subtitle {
                              color: #666;
                              text-align: center;
                              margin-bottom: 30px;
                              font-size: 14px;
                }
                .form-group {
                              margin-bottom: 20px;
                }
                label {
                              display: block;
                              margin-bottom: 5px;
                              color: #333;
                              font-weight: 500;
                }
                input[type="password"] {
                              width: 100%;
                              padding: 12px;
                              border: 2px solid #e1e5e9;
                              border-radius: 6px;
                              font-size: 16px;
                              transition: border-color 0.3s;
                }
                input[type="password"]:focus {
                              outline: none;
                              border-color: #1e3c72;
                }
                .login-btn {
                              width: 100%;
                              padding: 12px;
                              background: #1e3c72;
                              color: white;
                              border: none;
                              border-radius: 6px;
                              font-size: 16px;
                              font-weight: 600;
                              cursor: pointer;
                              transition: background-color 0.3s;
                }
                .login-btn:hover {
                              background: #2a5298;
                }
                .error {
                              color: #dc3545;
                              font-size: 14px;
                              margin-top: 10px;
                              text-align: center;
                }
            </style>
  </head>
  <body>
        <div class="login-container">
                  <div class="logo">
                                <img src="logo.jpg" alt="LifeBridge Church" />
                  </div>div>
                  <h1>Welcome Back</h1>
                <p class="subtitle">Renovation Tracker Login</p>p>
                
                <form method="POST" action="/login">
                            <div class="form-group">
                                            <label for="password">Password:</label>label>
                                            <input type="password" id="password" name="password" required>
                            </div>div>
                            
                            <button type="submit" class="login-btn">
                                            Login
                            </button>button>
                </form>form>
        </div>div>
  </body>
</html>html></h1>
  </body>
      </style></title>
  </head>
