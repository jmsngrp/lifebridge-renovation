<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LifeBridge Church Renovation Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
    body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo img { height: 60px; object-fit: contain; }
    h1 { color: #1e3c72; font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 14px; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 14px; }
    input[type="password"] { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 15px; transition: border-color 0.3s; }
    input[type="password"]:focus { outline: none; border-color: #1e3c72; }
    .login-btn { width: 100%; padding: 12px; background: #1e3c72; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; }
    .login-btn:hover { background: #2a5298; }
    .error { color: #dc3545; font-size: 14px; margin-top: 10px; text-align: center; }
  </style>
</head>
